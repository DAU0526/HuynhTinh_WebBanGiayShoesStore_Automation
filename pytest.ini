[pytest]
# =============================================================================
# PYTEST CONFIGURATION — Shoes Store POM Test Suite
# =============================================================================

# Test discovery
testpaths = tests/pom/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options
addopts =
    -v
    --tb=short
    --html=results/pom_report.html
    --self-contained-html
    --capture=no

# Markers
markers =
    smoke: Smoke tests - kiểm tra luồng chính nhanh
    regression: Regression tests - kiểm tra đầy đủ tất cả TCs
    auth: Module xác thực (Login/Logout)
    register: Module đăng ký tài khoản
    product: Module sản phẩm
    cart: Module giỏ hàng
    order: Module đặt hàng
    pom: Tests dùng Page Object Model pattern

# Logging
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S
